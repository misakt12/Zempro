name: iOS Build

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI
  push:
    branches: [ "main", "master" ]

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build iOS App (Unsigned)
      run: |
        cd iosApp
        # Odemkneme keychain (i když není podepsáno, xcodebuild to občas vyžaduje)
        security create-keychain -p "" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "" build.keychain
        security set-keychain-settings
        
        # Build xcode projektu bez certifikátů
        xcodebuild clean build \
          -project iosApp.xcodeproj \
          -scheme iosApp \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          COMPILER_INDEX_STORE_ENABLE=NO > ../xcodebuild.log 2>&1 || (tail -n 100 ../xcodebuild.log && exit 1)
          
    - name: Upload Build Log
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: xcodebuild-log
        path: xcodebuild.log
        retention-days: 3
          
    - name: Package to IPA
      run: |
        cd iosApp
        # Vytvoření složky Payload (nutné pro .ipa strukturu)
        mkdir -p build/Payload
        # Zkopírování zkompilované appky
        cp -R build/Release-iphoneos/iosApp.app build/Payload/
        # Zabalení do .ipa souboru
        cd build
        zip -qr zempro-ios-unsigned.ipa Payload/
        
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: zempro-ios-app
        path: iosApp/build/zempro-ios-unsigned.ipa
        retention-days: 7
